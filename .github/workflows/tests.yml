name: Tests

on:
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --run
