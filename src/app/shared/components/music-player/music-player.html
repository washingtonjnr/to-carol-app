<div class="music-player" [class.expanded]="isExpanded()">

  <div class="player__bar">
    <button class="player__expand-btn" (click)="toggleExpand()" [attr.aria-label]="isExpanded() ? 'Collapse playlist' : 'Expand playlist'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        @if (!isExpanded()) { 
          <path d="M9 18V5l12-2v13"/> 
          <path d="M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
          <path d="M18 19a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
        }
        @else { 
          <path d="M18 15l-6-6-6 6"/> 
        }
      </svg>
    </button>

    <div class="player__info">
      <span class="player__title">{{ currentTrack().title }}</span>
      <span class="player__artist">{{ currentTrack().artist }}</span>
    </div>

    <div class="player__controls">
      <button class="ctrl-btn" (click)="prev()" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>

      <button class="ctrl-btn ctrl-btn--play" (click)="togglePlay()" [attr.aria-label]="isPlaying() ? 'Pause' : 'Play'">
        <svg viewBox="0 0 24 24" fill="currentColor">
          @if(!isPlaying()) { <path d="M8 5v14l11-7z"/> }
          @else { <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/> }
        </svg>
      </button>

      <button class="ctrl-btn" (click)="next()" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path transform="scale(-1, 1) translate(-24, 0)" d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="player__playlist">
    @for (item of playlist; track item.title; let i = $index) {
      <button
        class="playlist__item"
        [class.active]="i === currentIndex()"
        (click)="selectTrack(i)"
      >
        <span class="playlist__num">{{ i + 1 }}</span>
        <div class="playlist__meta">
          <span class="playlist__title">{{ item.title }}</span>
          <span class="playlist__artist">{{ item.artist }}</span>
        </div>

        @if(i === currentIndex() && isPlaying()) {
          <svg class="playlist__eq" viewBox="0 0 24 24" fill="currentColor">
            <rect x="2"  y="10" width="3" height="14"/><rect x="7"  y="6"  width="3" height="18"/>
            <rect x="12" y="9"  width="3" height="15"/><rect x="17" y="4"  width="3" height="20"/>
          </svg>
        }
      </button>
    }
  </div>
</div>
